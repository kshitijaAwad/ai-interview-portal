spring.application.name=Exam-Backend
#DB config
spring.datasource.url=jdbc:mysql://localhost:3306/AIInterviewPortal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
jwt.secret=MyVerySecretKeyForInterviewPortalProject123456789
jwt.expiration=86400000
openrouter.api.key="YOUR_API_KEY"
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
#default server port 8080
